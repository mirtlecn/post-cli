name: nightly

on:
  push:
    branches:
      - main
      - master
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".goreleaser.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean

      - name: Upload nightly macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: post-nightly-darwin-${{ github.run_number }}
          path: dist/post_*_darwin_*.tar.gz
          if-no-files-found: error

      - name: Upload nightly Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: post-nightly-linux-${{ github.run_number }}
          path: dist/post_*_linux_*.tar.gz
          if-no-files-found: error

      - name: Upload nightly Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: post-nightly-windows-${{ github.run_number }}
          path: dist/post_*_windows_*.zip
          if-no-files-found: error

      - name: Upload nightly checksums
        uses: actions/upload-artifact@v6
        with:
          name: post-nightly-checksums-${{ github.run_number }}
          path: dist/checksums.txt
          if-no-files-found: error
