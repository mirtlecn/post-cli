version: 2

project_name: post

before:
  hooks:
    - go test ./...

builds:
  - id: post
    main: ./cmd/post
    binary: post
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mirtle/post-cli/internal/buildinfo.Version={{ .Version }}
      - -X github.com/mirtle/post-cli/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/mirtle/post-cli/internal/buildinfo.BuildDate={{ .Date }}

archives:
  - id: default
    builds:
      - post
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  disable: true
